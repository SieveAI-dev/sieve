name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# ADR-006: RUSTFLAGS 全局注入，warning 即 error
env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 安装 toolchain（via rust-toolchain.toml）
        run: rustup show
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup show
      - uses: Swatinem/rust-cache@v2
      - name: 安装构建依赖（vectorscan 需要 cmake/ninja/ragel）
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build pkg-config libssl-dev libboost-dev ragel
      - run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - run: rustup show
      - uses: Swatinem/rust-cache@v2
      - name: 安装构建依赖（Linux）
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build pkg-config libssl-dev libboost-dev ragel
      - name: 安装构建依赖（macOS）
        if: runner.os == 'macOS'
        run: |
          brew install cmake ninja pkg-config boost ragel
      - run: cargo test --workspace --locked

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # ADR-003: 检查出站依赖来源、license 合规、漏洞
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features

  fuzz-quick:
    name: fuzz-quick (cargo fuzz, 60s/target)
    runs-on: ubuntu-latest
    # 真根因（已本地 macOS 复现）：cargo-fuzz src/project.rs 在 Linux
    # target 注入 `-Cllvm-args=-sanitizer-coverage-stack-depth`，
    # 该 flag 让 ASan/SanCov instrumentation emit 对 `__sancov_lowest_stack`
    # / `__sancov_gen_.*` 的 stack-depth 引用。但新版 LLVM 19/20 的新
    # pass manager 不再识别同时注入的 `-Cpasses=sancov-module`（legacy
    # pass plugin 写法），SanCov pass 不运行 → 引用的符号没人定义
    # → 链接阶段悬空。macOS 不加 stack-depth flag 所以无症状（本地误导
    # 多次试错），但 CI 是 x86_64-unknown-linux-gnu 必触发；本地手工
    # 加 stack-depth 在 macOS 也能稳定复现 `__sancov_lowest_stack` undefined。
    #
    # 修法：clone cargo-fuzz master + sed 删 stack-depth 行 + cargo
    # install --path。等上游迁移到新 pass manager 兼容 flag 切 release 后回切。
    steps:
      - uses: actions/checkout@v4
      - run: rustup show
      - run: rustup install nightly --profile minimal
      - name: 安装构建依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build pkg-config libssl-dev libboost-dev ragel
      - name: 装 cargo-fuzz（patched：删除 Linux 专属 stack-depth flag）
        run: |
          set -euo pipefail
          git clone --depth 1 https://github.com/rust-fuzz/cargo-fuzz /tmp/cargo-fuzz
          cd /tmp/cargo-fuzz
          # 验证目标行存在；若上游已改名/移除则失败而非静默继续
          grep -q 'sanitizer-coverage-stack-depth' src/project.rs
          sed -i '/sanitizer-coverage-stack-depth/d' src/project.rs
          ! grep -q 'sanitizer-coverage-stack-depth' src/project.rs
          cargo install --path . --locked
      - uses: Swatinem/rust-cache@v2
      - name: Fuzz sse_parser (60s)
        run: cargo +nightly fuzz run sse_parser -- -max_total_time=60
      - name: Fuzz tool_use_aggregator (60s)
        run: cargo +nightly fuzz run tool_use_aggregator -- -max_total_time=60
      - name: Fuzz inbound_filter (60s)
        run: cargo +nightly fuzz run inbound_filter -- -max_total_time=60
