name: CI

# Phase 1 仅 macOS；Linux/Windows 推 Phase 2 后才恢复 matrix

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# RUSTFLAGS 全局注入，warning 即 error
env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: rustfmt
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: 安装 toolchain（via rust-toolchain.toml）
        run: rustup show
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - run: rustup show
      - uses: Swatinem/rust-cache@v2
      - name: 安装构建依赖（vectorscan 需要 cmake/ninja/ragel）
        run: |
          brew install cmake ninja pkg-config boost ragel
      # 不用 --all-features —— 它会带上 ga_keys gate，占位密钥下 const
      # assert E0080 会打挂 clippy（gate 的有效性改由下方专门的 ga-keys-gate job
      # 验证，不应误伤常规 lint）。改为默认 features 全 workspace + 单独覆盖唯一
      # 的功能 feature sequence_detection（行为序列检测 beta）。
      - name: clippy（默认 features，全 workspace）
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: clippy（sequence_detection beta 路径）
        run: cargo clippy -p sieve-cli --all-targets --features sequence_detection --locked -- -D warnings

  ga-keys-gate:
    name: ga_keys 编译期 gate 有效性
    # 常规 clippy/test 用默认 features 不带 ga_keys（--all-features 会被占位密钥的
    # const assert E0080 打挂）。这个专门 job 验证 ga_keys 编译期兜底没被意外删除，
    # 保证 fail-open 的验签永不可能进 GA 二进制。
    #
    # ⚠️ 当前状态：真 ed25519 公钥已嵌入源码（signature.rs TRUSTED_PUBKEY /
    # origin_header.rs SIEVE_ORIGIN_PUBLIC_KEY 均为真值），故 `--features ga_keys`
    # 现在会编译【成功】，本 job 原本「期望占位密钥下编译失败」的断言会反过来失败。
    # 但 ga_keys 尚未正式激活（信任根公钥日后可能更换），故本 job 暂设
    # continue-on-error：保留持续运行 + 失败可见的报警信号，但不阻塞整体 CI。
    #
    # 正式激活 ga_keys 时：①删除下方 continue-on-error，把本 job 反转为
    # expect-PASS（验证真公钥就位时 ga_keys 编译成功）；②给 release.yml 两步
    # cargo build 加 --features ga_keys（否则验签 fail-open 进发布产物）。
    runs-on: macos-14
    continue-on-error: true  # 真公钥已就位、ga_keys 暂未正式激活：本 job 预期失败但不阻塞 CI
    steps:
      - uses: actions/checkout@v4
      - run: rustup show
      - uses: Swatinem/rust-cache@v2
      - name: 安装构建依赖（macOS）
        run: |
          brew install cmake ninja pkg-config boost ragel
      - name: 占位密钥下 ga_keys 必须编译失败（fail-closed gate）
        run: |
          fail=0
          if cargo build -p sieve-updater --features ga_keys --locked 2>/dev/null; then
            echo "::error::sieve-updater ga_keys gate 未拒绝占位 TRUSTED_PUBKEY=None（编译期兜底失效）"
            fail=1
          fi
          if cargo build -p sieve-ipc --features ga_keys --locked 2>/dev/null; then
            echo "::error::sieve-ipc ga_keys gate 未拒绝占位 SIEVE_ORIGIN_PUBLIC_KEY 全零（编译期兜底失效）"
            fail=1
          fi
          if [ "$fail" = "0" ]; then
            echo "::notice::ga_keys 编译期 gate 有效 —— 占位密钥无法进 GA 二进制"
          fi
          exit $fail

  test:
    name: test (macos-14)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - run: rustup show
      - uses: Swatinem/rust-cache@v2
      - name: 安装构建依赖（macOS）
        run: |
          brew install cmake ninja pkg-config boost ragel
      - uses: taiki-e/install-action@nextest
      # nextest + retries（.config/nextest.toml profile ci）：集成测试 spawn 真 daemon +
      # mock 上游抢端口，高并发下偶发瞬时 ConnectionReset（如 outbound_block::r11，隔离稳过）。
      # retries 让这类瞬时 flake 不污染「完全自动化」CI 信号。
      - name: 单元 + 集成测试（nextest，retries 抗并发 flake）
        run: cargo nextest run --workspace --locked --profile ci
      - name: doctests（nextest 不覆盖 doctest）
        run: cargo test --workspace --locked --doc

  check-routing-matrix:
    name: 四路由覆盖门禁
    # 入站检测必须覆盖 4 条 content-type 路由（Anthropic/OpenAI × SSE/JSON）。
    # 纯源码 + 测试静态扫描，无需构建，直接拦截「JSON handler 摘掉入站钩子」的回归形状。
    # 与 deny / fuzz-quick 同理：平台无关的静态门禁不强制走 macOS runner。
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 四路由入站钩子接线 + 端到端测试锚点检查
        run: bash scripts/check_routing_coverage.sh

  dogfood:
    name: dogfood hermetic (macos-14)
    # 完全 hermetic：无真 ANTHROPIC_API_KEY、无真网络、无真 GUI，零 secret。
    # Rust e2e（dogfood_e2e / updater_e2e / sieve-testing）已在 test job 跑；
    # 本 job 补 Python smoke 黑盒（起真 daemon + 本地 mock 上游）。
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - run: rustup show
      - uses: Swatinem/rust-cache@v2
      - name: 安装构建依赖（macOS）
        run: |
          brew install cmake ninja pkg-config boost ragel
      - name: 构建 release 二进制
        run: cargo build --release -p sieve-cli --locked
      - name: Python smoke (--mock-only，无真 API/网络)
        run: python3 scripts/smoke_test.py --mock-only

  deny:
    name: cargo-deny
    # EmbarkStudios/cargo-deny-action@v2 是 Container action，只支持 Linux runner。
    # cargo-deny 是供应链审计（依赖来源 / license / 漏洞），与运行平台无关，
    # 跟 fuzz-quick 同样模式：Phase 1 仅 macOS 的约束不强制要求审计 job 也切 macOS。
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # 检查出站依赖来源、license 合规、漏洞
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features

  fuzz-quick:
    # cargo-fuzz 依赖 nightly + libfuzzer，在 Linux 上更稳定（macOS 支持有限）。
    # fuzz 是 nightly 调研工具，不是发布支撑路径，保留 ubuntu-latest runner。
    # Phase 1 仅 macOS 的约束不强制要求 fuzz runner 也切 macOS。
    name: fuzz-quick (cargo fuzz, 60s/target)
    runs-on: ubuntu-latest
    # 关 ASan 跑 fuzz：rust-fuzz/cargo-fuzz#404 已知问题。LLVM 20 的 ASan
    # 与 cargo-fuzz 0.13.1 的 SanCov instrumentation 路径冲突，链接报
    # 大量 `__sancov_gen_.*` / `__sancov_lowest_stack` undefined（同时
    # 注入的 `-Cpasses=sancov-module` 是 legacy pass manager 写法，
    # 新 LLVM pass manager 不识别 → SanCov pass 不运行 → 符号无定义）。
    # 上游推荐 workaround：`cargo fuzz run -s none` 禁用 sanitizer。
    # 项目代码 `#![forbid(unsafe_code)]`，ASan 价值有限；libfuzzer
    # 仍能 detect panic / overflow / OOM。等 LLVM/cargo-fuzz 上游修后
    # 删 `-s none` 恢复。
    steps:
      - uses: actions/checkout@v4
      - run: rustup show
      - run: rustup install nightly --profile minimal
      - name: 安装构建依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build pkg-config libssl-dev libboost-dev ragel
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz
      - uses: Swatinem/rust-cache@v2
      - name: Fuzz sse_parser (60s)
        run: cargo +nightly fuzz run -s none sse_parser -- -max_total_time=60
      - name: Fuzz sse_parser_openai (60s)
        # Phase 1 已接 OpenAI 协议，SSE 边界 fuzz 必须覆盖
        # OpenAI 分支。target 见 fuzz/fuzz_targets/sse_parser_openai.rs。
        run: cargo +nightly fuzz run -s none sse_parser_openai -- -max_total_time=60
      - name: Fuzz tool_use_aggregator (60s)
        run: cargo +nightly fuzz run -s none tool_use_aggregator -- -max_total_time=60
      - name: Fuzz inbound_filter (60s)
        run: cargo +nightly fuzz run -s none inbound_filter -- -max_total_time=60
