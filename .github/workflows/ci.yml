name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# ADR-006: RUSTFLAGS 全局注入，warning 即 error
env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 安装 toolchain（via rust-toolchain.toml）
        run: rustup show
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup show
      - uses: Swatinem/rust-cache@v2
      - name: 安装构建依赖（vectorscan 需要 cmake/ninja/ragel）
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build pkg-config libssl-dev libboost-dev ragel
      - run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - run: rustup show
      - uses: Swatinem/rust-cache@v2
      - name: 安装构建依赖（Linux）
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build pkg-config libssl-dev libboost-dev ragel
      - name: 安装构建依赖（macOS）
        if: runner.os == 'macOS'
        run: |
          brew install cmake ninja pkg-config boost ragel
      - run: cargo test --workspace --locked

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # ADR-003: 检查出站依赖来源、license 合规、漏洞
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features

  fuzz-quick:
    name: fuzz-quick (cargo fuzz, 60s/target)
    runs-on: ubuntu-latest
    # 修：cargo-fuzz 0.13.1（最新 release）在 RUSTFLAGS 注入
    # `-Cpasses=sancov-module`，这是 LLVM legacy pass plugin 写法。
    # 较新 nightly 升级到 LLVM 19/20 的新 pass manager 后已不识别此 flag，
    # 导致 SanCov pass 不运行，PCGuard 全局变量从未生成；
    # 而 `-Zsanitizer=address` 仍然 emit asan.module_dtor 对
    # `__sancov_gen_.*` 的引用，链接阶段大量悬空（rust-lld 与 GNU bfd
    # 都报错，证明问题在目标文件本身而非链接器）。
    #
    # 修法：pin nightly 到 cargo-fuzz 0.13.1 release 当期已知能跑的版本
    # （2024-09 与 cargo-fuzz 0.13.1 同期），等 cargo-fuzz 上游修复
    # 此问题（rust-fuzz/cargo-fuzz#494 等 issue）后再升级 nightly。
    env:
      NIGHTLY: nightly-2025-06-01
    steps:
      - uses: actions/checkout@v4
      - run: rustup show
      - run: rustup install ${{ env.NIGHTLY }} --profile minimal
      - name: 安装构建依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build pkg-config libssl-dev libboost-dev ragel
      - run: cargo install cargo-fuzz --locked
      - uses: Swatinem/rust-cache@v2
      - name: Fuzz sse_parser (60s)
        run: cargo +${{ env.NIGHTLY }} fuzz run sse_parser -- -max_total_time=60
      - name: Fuzz tool_use_aggregator (60s)
        run: cargo +${{ env.NIGHTLY }} fuzz run tool_use_aggregator -- -max_total_time=60
      - name: Fuzz inbound_filter (60s)
        run: cargo +${{ env.NIGHTLY }} fuzz run inbound_filter -- -max_total_time=60
