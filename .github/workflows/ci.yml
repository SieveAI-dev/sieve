name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# ADR-006: RUSTFLAGS 全局注入，warning 即 error
env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 安装 toolchain（via rust-toolchain.toml）
        run: rustup show
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup show
      - uses: Swatinem/rust-cache@v2
      - name: 安装构建依赖（vectorscan 需要 cmake/ninja/ragel）
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build pkg-config libssl-dev libboost-dev ragel
      - run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - run: rustup show
      - uses: Swatinem/rust-cache@v2
      - name: 安装构建依赖（Linux）
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build pkg-config libssl-dev libboost-dev ragel
      - name: 安装构建依赖（macOS）
        if: runner.os == 'macOS'
        run: |
          brew install cmake ninja pkg-config boost ragel
      - run: cargo test --workspace --locked

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # ADR-003: 检查出站依赖来源、license 合规、漏洞
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features

  fuzz-quick:
    name: fuzz-quick (cargo fuzz, 60s/target)
    runs-on: ubuntu-latest
    # 修：新版 nightly Linux x86_64 默认切到 rust-lld，rust-lld 对 SanCov
    # PCGuard tables 做激进 GC 把 __sancov_gen_.* 定义丢失，asan.module_dtor.*
    # 大量符号悬空（macOS aarch64 默认 ld64 不受影响，本地实测通过）。
    # 强制 cc 改用 GNU bfd 链接器规避；同时确保 binutils 已装。
    env:
      RUSTFLAGS: "-D warnings -Clink-arg=-fuse-ld=bfd"
    steps:
      - uses: actions/checkout@v4
      - run: rustup show
      - run: rustup install nightly
      - name: 安装构建依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build pkg-config libssl-dev libboost-dev ragel binutils
      - run: cargo install cargo-fuzz --locked
      - uses: Swatinem/rust-cache@v2
      - name: Fuzz sse_parser (60s)
        run: cargo +nightly fuzz run sse_parser -- -max_total_time=60
      - name: Fuzz tool_use_aggregator (60s)
        run: cargo +nightly fuzz run tool_use_aggregator -- -max_total_time=60
      - name: Fuzz inbound_filter (60s)
        run: cargo +nightly fuzz run inbound_filter -- -max_total_time=60
